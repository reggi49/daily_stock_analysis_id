# ===================================
# A-share Watchlist Intelligent Analysis System - Docker Compose
# ===================================
# 
# Usage:
#   Scheduled mode: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI mode: docker-compose -f ./docker/docker-compose.yml up -d server
#   Both: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # Environment variables (loaded from .env file). Do not mount ../.env as a single-file volume to /app/.env,
  # otherwise the Docker mount point blocks the atomic os.replace update when saving config.
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    # Longbridge OAuth token cache persistence; entrypoint repairs container-side ownership for dsa user.
    # Create ../longbridge_tokens on the host before copying an authorized token cache into it.
    - ../longbridge_tokens:/home/dsa/.longbridge
    # To override frontend static assets, mount the local static directory
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Web/API service bind address (must be 0.0.0.0 inside container)
    - WEBUI_HOST=0.0.0.0
    # API_PORT is read from .env file, no need to hardcode here

    # Proxy settings (if needed)
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # Resource limits: 1G+ recommended for full analysis; 512M only suits lightweight Web/API, single stock, low-concurrency scenarios,
  # and it is recommended to set MAX_WORKERS=1 and avoid starting analyzer and server simultaneously.
  deploy:
    resources:
      limits:
        memory: 1G
      reservations:
        memory: 512M

services:
  # Scheduled task mode
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI mode
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "${API_PORT:-8000}"]
    # If network_mode: host is used, the ports mapping below is invalid; the port is specified by --port in the command
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
