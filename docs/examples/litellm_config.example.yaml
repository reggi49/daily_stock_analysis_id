# ===================================
# Advanced Model Routing YAML Template (underlying compatible with LiteLLM Router)
# ===================================
# Companion doc: docs/LLM_CONFIG_GUIDE.md section 3.2
#
# Usage:
# 1. Copy this file to litellm_config.yaml
# 2. Set LITELLM_CONFIG=./litellm_config.yaml in .env
# 3. Configure the model_list below as needed
#
# Key reference formats:
#   api_key: "os.environ/ENV_VAR_NAME"  → read from environment variable, avoid plaintext in file
#   api_key: "sk-xxxxxxxx"              → written directly (not recommended)
#
# More docs: https://docs.litellm.ai/docs/proxy/configs
# ===================================

model_list:
  # --- siliconflow (OpenAI compatible, one key for multiple models) ---
  # This is an example of a custom OpenAI-compatible model channel
  - model_name: openai/Qwen/Qwen3.5-397B-A17B
    litellm_params:
      model: openai/Qwen/Qwen3.5-397B-A17B
      api_key: "os.environ/LITELLM_API_KEY" # Read key from environment variable, safe against leakage
      api_base: https://api.siliconflow.cn/v1
      # The following config shows how to enable the enable_thinking switch for the Qwen model
      extra_body:
        chat_template_kwargs:
          enable_thinking: true

  # --- AIHubmix (OpenAI compatible, one key for multiple models) ---
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1

  - model_name: openai/claude-3-5-sonnet-20241022
    litellm_params:
      model: openai/claude-3-5-sonnet-20241022
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1

  # --- DeepSeek Official API (native provider, auto-resolves base_url) ---
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: "os.environ/DEEPSEEK_API_KEY"

  - model_name: deepseek/deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: "os.environ/DEEPSEEK_API_KEY"

  # --- Google Gemini (native, multi-key load balancing) ---
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY_1"

  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: "os.environ/GEMINI_API_KEY_2"

  # --- Anthropic Claude (native) ---
  # - model_name: anthropic/claude-3-5-sonnet-20241022
  #   litellm_params:
  #     model: anthropic/claude-3-5-sonnet-20241022
  #     api_key: "os.environ/ANTHROPIC_API_KEY"

  # --- OpenRouter (aggregator platform) ---
  # - model_name: openai/meta-llama/llama-3-70b-instruct
  #   litellm_params:
  #     model: openai/meta-llama/llama-3-70b-instruct
  #     api_key: "os.environ/OPENROUTER_API_KEY"
  #     api_base: https://openrouter.ai/api/v1

  # --- Ollama local model ---
  # - model_name: ollama/qwen3:8b
  #   litellm_params:
  #     model: ollama/qwen3:8b
  #     api_base: http://localhost:11434

# ===================================
# Router settings (optional)
# ===================================
router_settings:
  routing_strategy: simple-shuffle    # simple-shuffle / least-busy / latency-based
  num_retries: 2                      # retry count after a single deployment fails
  # timeout: 30                       # request timeout (seconds)
  # allowed_fails: 3                  # allowed failures before a deployment is cooled down
  # cooldown_time: 60                 # deployment cooldown time (seconds)
