# Automatically close stale Issues and PRs
# Check once a day and mark issues/PRs with no response for a long time

name: Stale Issues & PRs

on:
  schedule:
    # Check once a day at UTC 0:00 (Beijing time 8:00)
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: 🧹 Clean up stale Issues/PRs
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏷️ Mark and close stale content
        uses: actions/stale@v10
        with:
          # ===== Issue configuration =====
          days-before-issue-stale: 7
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This Issue has had **no activity for 7 days**.

            If the problem still exists, please reply with the latest status and we will continue to follow up.
            If the problem is resolved or no longer needed, you can close this Issue directly.

            **If there is no reply within 7 days, this Issue will be closed automatically.**
          close-issue-message: |
            🔒 This Issue has been automatically closed due to prolonged inactivity.

            If the problem still exists, feel free to reopen it or create a new Issue.
          
          # ===== PR configuration =====
          days-before-pr-stale: 21
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This PR has had **no activity for 21 days**.

            Please check if you need to:
            - Resolve merge conflicts
            - Reply to review comments
            - Update the code

            **If there is no update within 14 days, this PR will be closed automatically.**
          close-pr-message: |
            🔒 This PR has been automatically closed due to prolonged inactivity.

            If you still want these changes merged, please reopen it or create a new PR.
          
          # ===== Exclusion rules =====
          # Items with these labels will not be marked stale
          exempt-issue-labels: 'pinned,security,enhancement,help wanted,good first issue'
          exempt-pr-labels: 'pinned,security,work-in-progress,wip'
          
          # Exclude draft PRs
          exempt-draft-pr: true
          
          # ===== Other configuration =====
          # Max number processed per run
          operations-per-run: 50
          
          # Only process these states
          only-labels: ''
          
          # Remove stale label (when there is new activity)
          remove-stale-when-updated: true
          
          # Debug mode (when true, only prints without actually acting)
          debug-only: false
