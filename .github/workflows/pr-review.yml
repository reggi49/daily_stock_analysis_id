# PR Auto Review - syntax check + AI semantic review
# Automatically triggered when a PR is created or updated

name: PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '**.md'
      - '**.ts'
      - '**.tsx'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'apps/dsa-web/**'
      - 'requirements.txt'
      - '.github/requirements-ci.txt'
      - 'pyproject.toml'
      - 'setup.cfg'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'docker/Dockerfile'
      - 'docker-compose.yml'
  # Allow manual trigger (for re-review)
  workflow_dispatch:

# Limit concurrency to avoid duplicate comments when the same PR is triggered multiple times
concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ==================== Security Check (detect sensitive file changes) ====================
  security-check:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    outputs:
      safe_to_run: ${{ steps.check_sensitive.outputs.safe_to_run }}
      sensitive_files_changed: ${{ steps.check_sensitive.outputs.sensitive_files_changed }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      
      - name: 🔄 Fetch base branch
        run: git fetch origin ${{ github.base_ref || 'main' }}:refs/remotes/origin/${{ github.base_ref || 'main' }}
      
      - name: 🔒 Check sensitive file changes
        id: check_sensitive
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          SENSITIVE_FILES=$(git diff --name-only origin/$BASE_REF...HEAD | grep -E '^(\.github/workflows/.*\.yml|\.github/scripts/.*\.py)$' || echo "")
          
          if [ -n "$SENSITIVE_FILES" ]; then
            echo "⚠️ **Sensitive file changes detected, manual review required!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Modified sensitive files:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$SENSITIVE_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Marked as sensitive change, please prioritize manual review; the automated flow continues." >> $GITHUB_STEP_SUMMARY
            echo "sensitive_files_changed=true" >> $GITHUB_OUTPUT
            echo "safe_to_run=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No sensitive file changes detected" >> $GITHUB_STEP_SUMMARY
            echo "sensitive_files_changed=false" >> $GITHUB_OUTPUT
            echo "safe_to_run=true" >> $GITHUB_OUTPUT
          fi

  # ==================== Static Check (before AI review) ====================
  auto-check:
    name: 🔍 Static Check
    runs-on: ubuntu-latest
    needs: [security-check]
    if: needs.security-check.outputs.safe_to_run == 'true'
    outputs:
      syntax_ok: ${{ steps.syntax.outputs.syntax_ok }}
      has_py_changes: ${{ steps.check_files.outputs.has_py_changes }}
      has_reviewable_changes: ${{ steps.check_files.outputs.has_reviewable_changes }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      
      - name: 🔄 Fetch base branch
        run: git fetch origin ${{ github.base_ref || 'main' }}:refs/remotes/origin/${{ github.base_ref || 'main' }}
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8
      
      - name: 📋 Check changed files
        id: check_files
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          CHANGED_FILES=$(git diff --name-only origin/$BASE_REF...HEAD -- '*.py' 2>/dev/null || echo "")
          REVIEWABLE_FILES=$(git diff --name-only origin/$BASE_REF...HEAD -- '*.py' '*.md' 'docs/**' 'README.md' 'AGENTS.md' 'requirements.txt' '.github/requirements-ci.txt' 'pyproject.toml' 'setup.cfg' '.github/PULL_REQUEST_TEMPLATE.md' '.github/workflows/**' '.github/scripts/**' 2>/dev/null || echo "")

          if [ -z "$REVIEWABLE_FILES" ]; then
            echo "has_reviewable_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_reviewable_changes=true" >> $GITHUB_OUTPUT
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "has_py_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No Python files modified" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_py_changes=true" >> $GITHUB_OUTPUT
            echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
            echo "$CHANGED_FILES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
      
      - name: 🐍 Python syntax check
        id: syntax
        if: steps.check_files.outputs.has_py_changes == 'true'
        run: |
          echo "## 🐍 Syntax Check" >> $GITHUB_STEP_SUMMARY
          echo "Files checked: $CHANGED_FILES"
          
          ERRORS=""
          SYNTAX_OK="true"
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              if ! python -m py_compile "$file" 2>&1; then
                ERRORS="$ERRORS\n❌ $file syntax error"
                SYNTAX_OK="false"
              fi
            fi
          done
          
          echo "syntax_ok=$SYNTAX_OK" >> $GITHUB_OUTPUT
          
          if [ "$SYNTAX_OK" = "false" ]; then
            echo -e "$ERRORS" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All files passed syntax check" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 🔎 Flake8 check (critical errors)
        if: steps.check_files.outputs.has_py_changes == 'true'
        run: |
          echo "## 🔎 Code Quality Check" >> $GITHUB_STEP_SUMMARY
          RESULT=$(flake8 $CHANGED_FILES --select=E9,F63,F7,F82 --format='%(path)s:%(row)d: %(code)s %(text)s' 2>/dev/null || true)
          if [ -n "$RESULT" ]; then
            echo "⚠️ Issues found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$RESULT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No critical code issues found" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 📊 Change statistics
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          echo "## 📊 Change Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          STATS=$(git diff --stat origin/$BASE_REF...HEAD 2>/dev/null | tail -1)
          echo "$STATS" >> $GITHUB_STEP_SUMMARY

  # ==================== AI Code Review (depends on static check passing) ====================
  ai-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    needs: [security-check, auto-check]
    if: |
      needs.security-check.outputs.safe_to_run == 'true' &&
      needs.auto-check.result == 'success' &&
      needs.auto-check.outputs.has_reviewable_changes == 'true' &&
      vars.ENABLE_AI_REVIEW != 'false'
    
    steps:
      # First check out the default branch (to get the latest .github/scripts)
      - name: 📥 Checkout default branch scripts
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false
          path: main-scripts
      
      # Then check out the PR code (for diff analysis)
      - name: 📥 Checkout PR code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          path: pr-code
      
      - name: 🔄 Fetch base branch
        working-directory: pr-code
        run: git fetch origin ${{ github.base_ref || 'main' }}:refs/remotes/origin/${{ github.base_ref || 'main' }}
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: pip install google-genai openai httpx
      
      - name: 🤖 AI review code changes
        working-directory: pr-code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.base_ref || 'main' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AI_REVIEW_STRICT: ${{ vars.AI_REVIEW_STRICT || 'false' }}
          CI_SYNTAX_OK: ${{ needs.auto-check.outputs.syntax_ok || '' }}
          CI_HAS_PY_CHANGES: ${{ needs.auto-check.outputs.has_py_changes || 'false' }}
          CI_AUTO_CHECK_RESULT: ${{ needs.auto-check.result || '' }}
        run: python ../main-scripts/.github/scripts/ai_review.py
      
      - name: 📤 Upload review result
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: ai-review-result
          path: pr-code/ai_review_result.txt
          if-no-files-found: ignore

  # ==================== PR Label Auto-Classification ====================
  labeler:
    name: 🏷️ Auto Label
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
      
      - name: 🏷️ Add labels
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const labels = new Set();
            
            for (const file of files) {
              const filename = file.filename.toLowerCase();
              
              if (filename.includes('notification') || filename.includes('webhook')) {
                labels.add('notification');
              }
              if (filename.includes('feishu')) {
                labels.add('feishu');
              }
              if (filename.includes('data_provider') || filename.includes('fetcher')) {
                labels.add('data-source');
              }
              if (filename.includes('analyzer') || filename.includes('ai')) {
                labels.add('ai');
              }
              if (filename.endsWith('.md') || filename.includes('doc')) {
                labels.add('documentation');
              }
              if (filename.includes('workflow') || filename.includes('.github')) {
                labels.add('ci/cd');
              }
              if (filename.includes('config')) {
                labels.add('configuration');
              }
              if (filename.includes('test')) {
                labels.add('testing');
              }
            }
            
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const totalChanges = additions + deletions;
            
            if (totalChanges < 50) {
              labels.add('size/S');
            } else if (totalChanges < 200) {
              labels.add('size/M');
            } else if (totalChanges < 500) {
              labels.add('size/L');
            } else {
              labels.add('size/XL');
            }
            
            if (labels.size > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: Array.from(labels)
                });
                console.log(`Added labels: ${Array.from(labels).join(', ')}`);
              } catch (e) {
                console.log(`Failed to add labels: ${e.message}`);
              }
            }

  # ==================== Auto-comment review results ====================
  comment:
    name: 💬 Review Report
    runs-on: ubuntu-latest
    needs: [security-check, auto-check, ai-review]
    if: always() && github.event_name == 'pull_request_target' && needs.security-check.outputs.safe_to_run == 'true'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: 📥 Download AI review result
        uses: actions/download-artifact@v7
        if: needs.ai-review.result == 'success'
        continue-on-error: true
        with:
          name: ai-review-result
          path: .
      
      - name: 💬 Generate review report
        env:
          AUTO_CHECK_RESULT: ${{ needs.auto-check.result }}
          AI_REVIEW_RESULT: ${{ needs.ai-review.result }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const changedFiles = files.length;
            
            let aiReview = '';
            try {
              aiReview = fs.readFileSync('ai_review_result.txt', 'utf8');
            } catch (e) {
              console.log('No AI review result found');
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('## 🤖 Automatic Review Report')
            );

            const checkStatus = process.env.AUTO_CHECK_RESULT === 'success' ? '✅ Passed' : '⚠️ Has issues';
            const aiStatus = process.env.AI_REVIEW_RESULT === 'success' ? '✅ Completed' :
                            process.env.AI_REVIEW_RESULT === 'skipped' ? '⏭️ Skipped' : '⚠️ Failed';

            let report = `## 🤖 Automatic Review Report

            | Item | Result |
            |------|--------|
            | 📊 Changed files | ${changedFiles} |
            | ➕ Lines added | ${additions} |
            | ➖ Lines deleted | ${deletions} |
            | 🔍 Static check | ${checkStatus} |
            | 🧠 AI review | ${aiStatus} |

            ### 📁 Modified Files

            `;

            for (const file of files.slice(0, 20)) {
              const status = file.status === 'added' ? '🆕' :
                            file.status === 'removed' ? '🗑️' : '📝';
              report += `- ${status} \`${file.filename}\` (+${file.additions}/-${file.deletions})\n`;
            }

            if (files.length > 20) {
              report += `\n... and ${files.length - 20} more files\n`;
            }

            if (aiReview) {
              report += `
            ---

            ### 🧠 AI Code Review Comments

            ${aiReview}
            `;
            }

            report += `
            ---

            > 💡 **Tip**: Please ensure the code passes local tests and follows the project code conventions.
            `;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }
