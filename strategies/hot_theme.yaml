# Hot Theme Strategy / Hot Theme

name: hot_theme
display_name: Hot Theme
description: Track policy, industry, and market hotspots; judge theme strength, sector diffusion, and individual stock relative strength.
category: framework
core_rules: [2, 3, 5, 7]
required_tools:
  - get_sector_rankings
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
aliases: [Hotspot, Theme, Hot Theme]
default_priority: 35
market_regimes: [sector_hot]

instructions: |
  **Hot Theme Strategy**

  Applicable scenarios:
  - A clear policy, industry, technology-route, or capital-grouping hotspot appears in the market.
  - Need to judge whether the stock truly benefits from the hotspot, rather than just riding the concept.

  Analysis framework:

  1. **Hotspot strength**
     - Use `get_sector_rankings` to judge whether the related sector is among the top recent gainers, turnover, or popularity.
     - Observe whether the hotspot spreads from a few core stocks to multiple stocks in the sector.
     - If only a single stock moves and the sector does not resonate, lower the signal weight.

  2. **Stock relevance**
     - Use `search_stock_news` to check whether the company's business, orders, capacity, customers, and announcements are directly related to the hotspot.
     - Distinguish "substantially benefits" / "indirectly benefits" / "weak concept linkage".
     - When concept linkage is weak but gains are excessive, warn of theme-realization risk.

  3. **Relative strength**
     - Use `get_realtime_quote` and `analyze_trend` to judge whether the stock's gain, volume ratio, and turnover are stronger than the sector average.
     - Strong hotspot stocks usually show expanding volume, active turnover, and pullbacks that hold key MAs.

  4. **Rhythm and risk**
     - Do not chase at continuously accelerating, high-deviation positions.
     - If news concentrates on "already surged", "funds chasing", "retail hot-money betting on the dragon-tiger board", watch for a short-term sentiment top.
     - Major negatives, regulatory inquiries, or clarification announcements can downgrade the rating with one vote.

  Output requirements:
  - Clarify current hotspot stage: launch / diffusion / divergence / ebb.
  - Explain the stock's substantive relevance to the hotspot.
  - Give executable trigger conditions: pullback support, volume breakout, continued sector resonance, or ebb stop-loss.

  Score adjustment suggestions:
  - Hotspot in launch or diffusion stage, and stock substantially benefits: `sentiment_score +12`
  - Stock stronger than sector with volume confirmation: additional `+6`
  - Hotspot enters divergence or ebb: `sentiment_score -8`
  - Only riding the concept with excessive deviation: `sentiment_score -12`
