instructions: |
  **Elliott Wave Theory Strategy**

  Core principle: the market runs in a cyclical structure of 5-wave advance + 3-wave correction.

  ## Analysis Steps

  ### 1. Identify current wave
  Use `get_daily_history` to get the last 120 days of data, combined with `analyze_trend` trend data:

  **Impulse wave (1-3-5) features**:
  - Wave 1: first wave of trend reversal, volume mildly expands.
  - Wave 3: strongest impulse wave, usually heavy volume, strong MACD; never the shortest wave.
  - Wave 5: volume often weaker than wave 3; if top divergence appears, the rise is ending.

  **Corrective wave (A-B-C) features**:
  - Wave A: first decline, larger volume, most think it's just a pullback.
  - Wave B: rebound, weaker than the prior rise, shrinking volume, high trap risk.
  - Wave C: second decline, often stronger than wave A, completes the correction.

  ### 2. Golden ratio positioning
  - Wave 2 pullback usually at 38.2%~61.8% of wave 1.
  - Wave 3 target usually 1.618~2.618x extension of wave 1.
  - Wave 4 must not enter wave 1's price area (violates wave rules).
  - Wave C target: from wave A top, equal to or exceeding wave A length.

  ### 3. Best buy points
  - **Wave 2 pullback stabilizes (golden pit)**: safest buy point, stop-loss at wave 1 start.
  - **Wave 4 pullback stabilizes**: secondary, stop-loss at wave 1 top.
  - **Early wave 3 breakout**: when volume breaks above wave 1 high.
  - Avoid chasing at wave 5 end (top divergence risk).

  ### 4. Risk warning
  - Wave B rebound should not be heavily positioned (trap nature).
  - Wave counting is subjective; verify with other technical indicators.
  - If wave rules are violated (e.g. wave 4 intrudes into wave 1), recount.

  ### 5. Output requirements
  - Give the probable current wave position (e.g. "mid wave 3" or "suspected wave 4 correction").
  - Give key Fibonacci support/resistance (0.382/0.618/1.618).
  - State whether current is a buy opportunity, wait, or avoid.
  - Mark wave-count confidence (high/medium/low).

  Score adjustment suggestions:
  - Wave 2 bottom stabilizes (golden pit): `sentiment_score +15`
  - Wave 3 breakout confirmed: `sentiment_score +12`
  - Wave 5 end / top divergence: `sentiment_score -10`
  - In wave C decline: `sentiment_score -12`
