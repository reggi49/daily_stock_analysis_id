# Box Range Trading Strategy / Box Oscillation
# Buy at box support, sell at box resistance, profit from range-bound oscillation.

name: box_oscillation
display_name: Box Oscillation
description: Identify price box ranges; buy at the box bottom and reduce at the box top. Suitable for sideways, range-bound markets.
category: framework
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [Box, Box Oscillation]
default_priority: 50
market_regimes: [sideways]

instructions: |
  **Box Range Trading Strategy**

  Core logic: prices within the box oscillate repeatedly between resistance and support,
  "buy near support, sell near resistance", earning range returns through swing trading.

  ## Analysis Steps

  ### 1. Box Identification
  Use `get_daily_history` to get the last 60~120 days of data:

  - **Box top (resistance)**: a line connecting recent highs that have been touched multiple times but not effectively broken.
    Usually a cluster of highs touched 3+ times within 20~60 days.
  - **Box bottom (support)**: a line connecting recent lows that have been tested multiple times but not effectively broken.
  - Box validity: both top and bottom must be touched at least 2~3 times to be confirmed.
  - Use `analyze_trend`'s support_levels / resistance_levels to assist positioning.

  ### 2. Current Position Assessment
  Use `get_realtime_quote` to get the current price and compare with box boundaries:

  - **Box bottom zone** (within ≤5% of support): buy/add signal, stop-loss 3% below box bottom.
  - **Box middle zone** (middle 1/3 of box): watch, no active action.
  - **Box top zone** (within ≤5% of resistance): reduce/take-profit signal, no chasing.

  ### 3. Volume-assisted Judgment
  - **Volume surge + stabilization at box bottom**: strong signal of valid support, can take a heavier position.
  - **Volume contraction + stagnation at box top**: sell signal of valid resistance.
  - **Box breakout (volume > 2x average)**:
    - Valid upward breakout → switch to bull trend strategy, new target = box height extension.
    - Valid downward breakdown → exit and wait, former support becomes resistance.

  ### 4. Box Width and Expected Return
  - Calculate box width: (top - bottom) / bottom × 100%.
  - Width < 5%: too little room to operate, not recommended.
  - Width 5%~15%: standard box, swing trading feasible.
  - Width > 15%: large box, can do larger swings.

  ### 5. False Breakout Identification
  - Single-day intraday touch of resistance/support then quick pullback, close back inside box → false breakout, keep box strategy.
  - Two consecutive closes breaking box boundary with expanding volume → true breakout, revise strategy.

  ### 6. Output Requirements
  - Clearly give the box top and bottom price levels.
  - Current price position (box bottom / middle / top).
  - If price has broken out, state direction and new target.
  - Suggested position and stop-loss level.

  Score adjustment suggestions:
  - Stabilization at box bottom + volume contraction: `sentiment_score +10`
  - Volume surge at box bottom pushing toward top: `sentiment_score +12`
  - Valid upward box breakout: `sentiment_score +15, switch to trend strategy`
  - In box top zone: `sentiment_score -5 (no chasing)`
  - Valid breakdown of box bottom: `sentiment_score -15, exit`
