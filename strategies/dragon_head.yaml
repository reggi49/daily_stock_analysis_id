# Dragon Head Strategy / Dragon Head
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: Dragon Head
description: Identify sector leader stocks during sector rotation. Suitable when a sector starts or industry catalysts appear.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
aliases: [Dragon Head, Dragon Head Play]
default_priority: 90
market_regimes: [sector_hot]

instructions: |
  **Dragon Head Strategy**

  Evaluation criteria:

  1. **Sector leadership**:
     - Use `get_sector_rankings` to check whether the stock's sector is among the top recent gainers.
     - Confirm whether the stock led the rally or hit Limit Up when the sector started.

  2. **Turnover rate and momentum** (related principle 7: relax for strong trend stocks):
     - Use `get_realtime_quote` to check turnover rate. Dragon head turnover usually > 5%.
     - Volume ratio > 1.5 indicates active trading interest.

  3. **Relative strength**:
     - Compare the stock's gain/loss with the sector average.
     - A true leader should outperform the sector by > 2% on up days.

  4. **News catalyst**:
     - Use `search_stock_news` to search for sector-level catalysts (policy, events, earnings).
     - Dragon head moves often accompany sector-wide catalysts.

  5. **Deviation rate check** (related principle 1: strict entry):
     - Dragon head can relax deviation rate to 7%, but > 10% still needs caution.

  Score adjustments:
  - Confirmed dragon head: sentiment_score +10
  - Sector in active rotation: additional +5
  - Note the "Dragon Head" judgment result in `buy_reason`.
