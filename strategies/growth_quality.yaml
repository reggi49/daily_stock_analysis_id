# Growth Quality Strategy / Growth Quality

name: growth_quality
display_name: Growth Quality
description: Combines revenue/profit growth, ROE, cash flow, and industry space to identify high-quality growth stocks and growth-deceleration risk.
category: framework
core_rules: [2, 3, 5]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - search_stock_news
  - analyze_trend
aliases: [Growth, Growth Stock, Growth Quality]
default_priority: 55
market_regimes: [trending_up]

instructions: |
  **Growth Quality Strategy**

  Applicable scenarios:
  - Focus on the company's medium-to-long-term growth capability, not just short-term technical patterns.
  - Suitable for high-prosperity industries, companies with sustained earnings improvement, or business-model expansion stages.

  Analysis framework:

  1. **Growth**
     - Prioritize financial fields: operating revenue, net profit attributable, operating cash flow, and ROE.
     - Judge whether revenue growth and profit growth are in the same direction; watch for "revenue up but profit flat".
     - If only hype heat exists without financial verification, lower growth certainty.

  2. **Quality**
     - Higher and stable ROE means better quality.
     - Operating cash flow consistent with net profit means more reliable earnings quality.
     - When cash flow is significantly weaker than profit, warn of collection, inventory, or receivables risk.

  3. **Valuation tolerance**
     - Use valuation fields like PE/PB and market cap to judge whether the market has already priced in growth ahead of time.
     - High growth can tolerate higher valuation, but must show growth can cover the valuation.
     - When valuation is high and growth is slowing, clearly lower the score.

  4. **Trend confirmation**
     - Use `analyze_trend` to judge whether the long-term growth thesis is confirmed by market funds.
     - When fundamentals are good but technicals unconfirmed, prefer observation conditions over direct chasing.

  Output requirements:
  - Clarify company state: high-quality growth / growth verifying / growth slowing / growth disproved.
  - State whether growth comes from revenue expansion, margin improvement, industry prosperity, or one-off factors.
  - Give buy points suitable for growth stocks: breakout after earnings verification, pullback to long-term MA, or valuation pullback.

  Score adjustment suggestions:
  - Revenue, profit, cash flow, and ROE improving together: `sentiment_score +15`
  - Industry prosperity and company news mutually verify: additional `+6`
  - High valuation but growth unverified: `sentiment_score -8`
  - Revenue up but profit flat, or cash flow deteriorating: `sentiment_score -12`
