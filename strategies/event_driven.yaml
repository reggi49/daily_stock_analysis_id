# Event Driven Strategy / Event Driven

name: event_driven
display_name: Event Driven
description: Around events such as earnings, policy, M&A, orders, and product launches; assesses catalyst strength, realization probability, and risk boundaries.
category: framework
core_rules: [3, 5]
required_tools:
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
aliases: [Event Driven, Catalyst, Catalyst Event]
default_priority: 45
market_regimes: [sector_hot, volatile]

instructions: |
  **Event Driven Strategy**

  Applicable scenarios:
  - Clear event catalysts appear for a company or industry, e.g. earnings pre-announcements, order wins, M&A/restructuring, policy implementation, product launches, regulatory penalties, lawsuits, etc.
  - Need to judge whether the event is a short-term trading catalyst, long-term fundamental improvement, or a realized catalyst (sell-the-news).

  Analysis framework:

  1. **Event classification**
     - Use `search_stock_news` to sort out recent key events.
     - Classify events into: earnings-type, policy-type, order/product-type, capital-operation-type, regulatory/risk-type.
     - Clarify event timing; expired or unknown-time info cannot be the main basis.

  2. **Impact path**
     - Judge whether the event affects revenue, margin, valuation, financing ability, market share, or only sentiment.
     - For major orders or policy tailwinds, state the realization cycle and uncertainty.
     - For regulatory, share-reduction, penalty, lawsuit events, prioritize risk.

  3. **Market reaction**
     - Use `get_realtime_quote` and `analyze_trend` to judge whether the event is already fully priced in.
     - Volume rally but not through key resistance → wait for confirmation.
     - High-level volume stagnation or a spike-then-fade after good news → watch for profit-taking pressure.

  4. **Trade plan**
     - Before the event is realized, emphasize position control and time window.
     - After realization, re-evaluate whether to switch from "expectation trade" to "earnings verification".
     - For negative events, first see whether risk is fully released before considering a rebound.

  Output requirements:
  - Clarify event nature: positive / negative / neutral / uncertain.
  - Give event credibility, realization cycle, and degree already reflected.
  - Operating suggestion must include failure conditions, e.g. announcement below expectations, break below key support, or event heat fading.

  Score adjustment suggestions:
  - High-credibility positive event and price not yet fully reflected: `sentiment_score +14`
  - Positive event already largely realized: `sentiment_score -6`
  - Negative event still unfolding: `sentiment_score -15`
  - Event impact unclear or conflicting info: stay neutral and lower confidence
