# Sentiment Cycle Strategy / Sentiment Cycle
# Uses market sentiment, turnover rate and volume pattern to time entries against crowd behavior.

name: emotion_cycle
display_name: Sentiment Cycle
description: Based on market sentiment, turnover rate, and volume-price structure; identifies sentiment lows (panic bottom) and sentiment highs (euphoria top) to position against the crowd.
category: framework
core_rules: [1, 2, 3, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - analyze_trend
  - search_stock_news
aliases: [Sentiment, Sentiment Cycle]
default_priority: 100
market_regimes: [sector_hot]

instructions: |
  **Sentiment Cycle Strategy**

  Core philosophy: market participants' sentiment cycles through "panic → pessimism → doubt → hope → optimism → excitement → greed → euphoria".
  Smart money positions at the panic bottom and exits at the euphoria top.

  ## Quantified Sentiment Stage Indicators

  ### Step 1: Turnover rate analysis (core sentiment heat indicator)
  Use `get_daily_history` and `get_realtime_quote`:

  - **Turnover < 0.5%/day**: market cold, no attention, potential bottom zone (buy others' panic when greedy).
  - **Turnover 0.5%~2%**: normal trading, stable sentiment.
  - **Turnover 2%~5%**: active, market starts paying attention, avoid chasing highs.
  - **Turnover > 5%**: high heat, hot money/retail flooding in, watch for sentiment top.
  - **Turnover > 10% (daily avg)**: extreme overheating, usually a short-term top.

  ### Step 2: Turnover rate trend
  Use `get_daily_history` to compute the last 20 days of turnover trend:
  - High→low (continuous cooling) + shrinking volume → sentiment ebbing, wait patiently.
  - Low→high (accelerating warming) + volume spike → sentiment starting, can enter.
  - Sudden single-day volume explosion (turnover > 5x prior) → often main force distributing, be cautious.

  ### Step 3: News sentiment analysis
  Use `search_stock_news` to search recent news and analyze sentiment tilt:
  - News concentrated on "catalyst realized, earnings beat, Limit Up, institutional recommendation" etc. → sentiment may be overheated.
  - News concentrated on "earnings decline, negatives, break below support" → pessimistic sentiment may form a bottom.
  - Extremely negative retail forum/social media sentiment → contrarian indicator, may be near a bottom.

  ### Step 4: MA contraction and volatility
  Use `analyze_trend`:
  - MA5/MA10/MA20 glued together (MA contraction) → coiling, direction pending, cold sentiment.
  - Volatility drops to lows (ATR shrinking) → extremely depressed sentiment, a precursor to a breakout.

  ## Sentiment Bottom Features (buy zone)
  Meet 3 or more of the following:
  ✅ Turnover over last 20 days at a 1-year low
  ✅ Volume continuously shrinking, below 50%+ of the 60-day average volume
  ✅ Recent news mostly low-key, neutral, or negative
  ✅ Price near or below MA20, but no panic crash
  ✅ Institutional holdings stable or slightly increasing (if data available)

  ## Sentiment Top Features (reduce zone)
  Meet 3 or more of the following:
  ⚠️ Turnover over last 5 days > 2x the 20-day average
  ⚠️ Volume pulses up (single day)
  ⚠️ News dominated by realized catalysts, sharply raised institutional targets, retail frenzy
  ⚠️ Price deviates from MA5 by > 8% (high deviation)
  ⚠️ MACD shows top divergence

  ## Output requirements
  - Current sentiment stage: cold bottom / stable / warming entry / overheating caution / euphoria top.
  - Current turnover vs the 1-year average turnover.
  - Whether sentiment bottom or top features are met (list satisfied items).
  - Give a contrarian operating suggestion (be greedy when others panic, be cautious when others are greedy).

  Score adjustment suggestions:
  - Sentiment bottom features met (3+): `sentiment_score +14`
  - Sentiment bottom features met (all 5): `sentiment_score +20`
  - Sentiment top features met (3+): `sentiment_score -12`
  - Sentiment top features met (all 5): `sentiment_score -20`
  - Stable sentiment zone: no base score adjustment
