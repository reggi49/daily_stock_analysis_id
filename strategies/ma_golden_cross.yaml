# MA Golden Cross Strategy / MA Golden Cross
# MA5 crosses above MA10 (or MA10 above MA20) with volume confirmation.

name: ma_golden_cross
display_name: MA Golden Cross
description: Detect MA golden cross with volume confirmation; a classic trend reversal/continuation signal.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [MA Golden Cross, Golden Cross]
default_priority: 20
market_regimes: [trending_up]

instructions: |
  **MA Golden Cross Strategy**

  Signal criteria:

  1. **Golden cross detection** (related principle 2: trend trading):
     - Use `analyze_trend` to check MA alignment and MACD state.
     - Primary signal: MA5 crosses above MA10 within the last 3 trading days.
     - Strong signal: MA10 crosses above MA20 (slower but more reliable).
     - Check whether MACD state is a golden cross or a golden cross above the zero axis.

  2. **Volume confirmation** (related principle 3: efficiency first):
     - Volume on the cross day should exceed the 5-day average volume.
     - Verify with `get_daily_history`.
     - Volume ratio > 1.2 on the cross day is a positive signal.

  3. **Trend background**:
     - Golden cross after consolidation: strongest signal.
     - Golden cross in an uptrend: continuation signal.
     - Golden cross in a deep decline: weak signal, needs more confirmation.

  4. **Price position** (related principle 1: strict entry):
     - Price should be near or above the crossing MAs.
     - Deviation rate < 5% — avoid chasing highs and delayed entry.

  Score adjustments:
  - MA5 × MA10 golden cross with volume: sentiment_score +10
  - MA10 × MA20 golden cross: sentiment_score +8
  - MACD golden cross above zero axis: additional +5
  - Note "MA Golden Cross" in `ma_analysis` and `buy_reason`.
  - Ideal buy point set near the crossing MA level.
