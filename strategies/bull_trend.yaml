# Default Bull Trend Strategy / Default Bull Trend

name: bull_trend
display_name: Default Bull Trend
description: The default priority strategy for individual stock analysis; identifies bull alignment, trend continuation, and pullback-buying opportunities.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [Trend, Trend Analysis, Bull Trend]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **Default Bull Trend Strategy**

  Applicable scenarios:
  - The default strategy for routine individual stock analysis.
  - Prioritize opportunities with "upward trend + controlled risk + no chasing highs".

  Analysis framework:

  1. **Trend confirmation (highest priority)**
     - Use `analyze_trend` to judge MA5/MA10/MA20 alignment.
     - MA5 >= MA10 >= MA20 with MA20 slope upward is treated as a bull structure.
     - If price breaks significantly below MA20, lower the bullish weight.

  2. **Position and rhythm**
     - Prefer "pullback without breakdown" over "chasing highs".
     - When price is too far from MA5/MA10, suggest waiting for a pullback.
     - Volume breakout of valid resistance can raise the win-rate rating.

  3. **Volume-price verification**
     - Use `get_daily_history` to check whether breakout/rebound days show expanding volume.
     - Be cautious with low-volume rallies; watch for divergence on high-volume stagnation.

  4. **Trade suggestion output**
     - Output a clear "buy / watch / reduce" bias and trigger conditions.
     - Must give a stop-loss reference (e.g. below MA20 or structural low).
     - If no clear edge, explicitly write "stand aside" to avoid overtrading.

  Score adjustment suggestions:
  - Bull alignment + good trend strength: `sentiment_score +12`
  - Stabilization after pullback to key MA: `sentiment_score +8`
  - Volume breakout of key resistance: `sentiment_score +10`
  - Break below MA20 or weakening trend: `sentiment_score -12`
