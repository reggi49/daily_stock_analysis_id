# Shrink Volume Pullback Strategy / Shrink Volume Pullback
# Volume shrinks during pullback to MA5/MA10, then price bounces.

name: shrink_pullback
display_name: Shrink Volume Pullback
description: Detect the shrink-volume pullback to MA support signal; an ideal entry point for trend continuation.
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [Shrink Volume Pullback, Pullback]
default_router: true
default_priority: 40
market_regimes: [trending_down, sideways]

instructions: |
  **Shrink Volume Pullback Strategy**

  Entry criteria:

  1. **Prerequisites** (related principle 2: trend trading):
     - Stock must be in an uptrend (MA5 > MA10 > MA20).
     - Use `analyze_trend` to confirm bull alignment.

  2. **Pullback detection** (related principle 4: buy-point preference):
     - Use `get_daily_history` and `get_realtime_quote`.
     - Price pulls back near MA5 (within 1% error) or near MA10 (within 2% error).
     - Volume during pullback < 70% of 5-day average volume (shrink-volume feature).
     - `analyze_trend` → volume_status should show shrinking volume.

  3. **Rebound signal** (related principle 1: strict entry):
     - Current price holds the MA support.
     - MA5 deviation rate < 2% — best buy zone.

  4. **Confirmation conditions** (related principle 5: risk screening):
     - `search_stock_news` shows no negative news.
     - Healthy chip distribution (profit ratio 50-80%).

  Score adjustments:
  - Shrink-volume pullback to MA5: sentiment_score +10
  - Shrink-volume pullback to MA10 with volume < 0.6x average: sentiment_score +8
  - Ideal buy point at MA5 level, secondary buy point at MA10.
  - Stop-loss at MA20 level.
  - Note "Shrink Volume Pullback" in `buy_reason`.
