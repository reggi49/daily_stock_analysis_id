# Expectation Repricing Strategy / Expectation Repricing

name: expectation_repricing
display_name: Expectation Repricing
description: Analyze changes in earnings expectations, policy expectations, and valuation expectations; find expectation-gap repair or pullback risk after expectations overheat.
category: framework
core_rules: [3, 5, 6]
required_tools:
  - search_stock_news
  - get_stock_info
  - get_realtime_quote
  - analyze_trend
aliases: [Expectation, Expectation Gap, Expectation Repricing]
default_priority: 65
market_regimes: [volatile, sector_hot]

instructions: |
  **Expectation Repricing Strategy**

  Applicable scenarios:
  - Market expectations for the company's earnings, policy, industry prosperity, valuation center, or competitive landscape are changing.
  - Need to judge whether the current price reflects "expectation repair", "expectation miss", or "expectation overheating".

  Analysis framework:

  1. **Expectation sources**
     - Use `search_stock_news` to identify recent info that changed market expectations: earnings pre-announcements, institutional views, orders, policy, product progress, industry data.
     - Distinguish hard info (announcements, financials, orders) from soft info (rumors, opinions, sentiment).

  2. **Expectation-gap direction**
     - Positive gap: market was originally pessimistic, new info shows business or earnings better than expected.
     - Negative gap: market was originally optimistic, new info is below expectations or verification failed.
     - If info is already fully reflected by consecutive rallies, warn of expectation-realization risk.

  3. **Valuation repricing**
     - Use PE/PB, market cap, ROE, cash flow to judge whether valuation repricing has fundamental support.
     - Valuation uplift must match earnings quality, growth sustainability, and industry space.
     - When valuation falls, observe whether it is caused by one-off disturbance or a long-term logic change.

  4. **Price confirmation**
     - Use `analyze_trend` to judge whether the expectation change has turned into a trend.
     - Volume breakout can be seen as funds confirming the expectation; low-volume rebound leans more toward repair observation.
     - High-level volume stagnation, good news not rising, or break below key support may mean expectations are weakening.

  Output requirements:
  - Clarify current state: positive gap / expectation realized / negative gap / unclear expectation.
  - State which info changed market expectations and which still awaits verification.
  - Give observation points: next earnings report, order realization, policy implementation, valuation pullback, or technical confirmation.

  Score adjustment suggestions:
  - Positive gap and price not yet fully reflected: `sentiment_score +15`
  - Positive gap already realized by consecutive rallies: `sentiment_score -5`
  - Negative gap or core assumption disproved: `sentiment_score -15`
  - Insufficient info but potential repair exists: stay neutral and lower confidence
