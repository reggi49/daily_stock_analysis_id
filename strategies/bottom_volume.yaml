# Bottom Volume Surge Strategy / Bottom Volume Surge
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: Bottom Volume Surge
description: Detect bottom volume surge signals after a prolonged decline; a potential trend reversal signal.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [Bottom Volume, Bottom Volume Surge]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **Bottom Volume Surge Strategy**

  Reversal criteria:

  1. **Confirm sustained decline**:
     - Use `get_daily_history` (30 days).
     - Price drop from the 20-day high to the recent low should be > 15%.
     - `analyze_trend` → trend_status should be BEAR or STRONG_BEAR.

  2. **Volume anomalies**:
     - Today's volume > 3x the 5-day average volume.
     - Use `get_realtime_quote` → volume_ratio > 3.0.
     - This anomaly should appear after an earlier period of extreme volume contraction.

  3. **Price stabilization**:
     - Today's candle is bullish (close > open).
     - Price holds above the recent low.
     - Ideally a long lower shadow appears, showing buyer support.

  4. **Confirmation factors** (related principle 5: risk screening):
     - Use `search_stock_news` to confirm any fundamental catalyst.
     - Chip distribution: average cost near current price (cost convergence).

  5. **Risk warning** (related principle 2: trend trading):
     - This is a reversal signal, riskier than trend following.
     - Keep position small (at most 20-30%).
     - Stop-loss must be strict (placed below the recent low).

  Score adjustments:
  - Bottom volume surge confirmed: sentiment_score +8
  - With bullish candle + news catalyst: additional +5
  - Note "Bottom Volume Surge" in `buy_reason` and `pattern_analysis`.
  - Stop-loss placed at the recent low.
