# Volume Breakout Strategy / Volume Breakout
# Price breaks above resistance on heavy volume (>2x average).

name: volume_breakout
display_name: Volume Breakout
description: Detect volume breakout above resistance signal. Suitable when price approaches a known resistance level.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [Volume Breakout, Breakout]
default_priority: 30
market_regimes: [trending_up]

instructions: |
  **Volume Breakout Strategy**

  Breakout criteria:

  1. **Resistance identification**:
     - Use `analyze_trend` → resistance_levels to get resistance.
     - Usually the 20-day high or the top of an earlier consolidation platform.

  2. **Volume confirmation** (related principle 3: efficiency first):
     - Today's volume > 2x the 5-day average volume.
     - Use `get_realtime_quote` → volume_ratio > 2.0 to confirm.
     - Use `get_daily_history` to compute average volume for cross-validation.

  3. **Price confirmation** (related principle 1: strict entry):
     - Close must stand above the resistance.
     - Close should be in the top 30% of the day's range (strong close).
     - After breakout, check deviation rate: still < 5%, avoid chasing highs.

  4. **Follow-up verification** (if data available):
     - Next day's open should be above the breakout level, to distinguish true from false breakout.

  5. **Risk filter** (related principle 5: risk screening):
     - Use `search_stock_news` to check no major negatives.
     - PE should not be too high (avoid bubble-type breakout).

  Score adjustments:
  - Volume breakout confirmed: sentiment_score +12
  - Breakout with sector resonance (sector also strengthening): additional +5
  - Ideal buy point near the breakout level, stop-loss 3% below the breakout level.
  - Note "Volume Breakout" in `buy_reason` and `volume_analysis`.
