# One Yang Three Yin Strategy / One Yang Three Yin
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: One Yang Three Yin
description: Detect the One Yang Three Yin K-line consolidation pattern; a trend-continuation entry signal.
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [One Yang Penetrates Three Yin, One Yang Three Yin]
default_priority: 110

instructions: |
  **One Yang Three Yin Strategy**

  Pattern definition (last 5 trading days):

  1. **Day 1**: large bullish candle (close > open, body > 2% of price).
  2. **Days 2-4**: three consecutive bearish or small candles:
     - Each candle's low does not break below Day 1's open.
     - Volume should shrink progressively (volume ratio < 0.8).
     - The three candles should close within Day 1's body range.
  3. **Day 5**: another bullish candle, close breaks above Day 1's close.

  How to evaluate with tools:

  1. Use `get_daily_history` to get the last 10 days of data.
  2. Check whether the last 5 candles match the above pattern.
  3. Use `analyze_trend` to confirm bull alignment (related principle 2: trend trading, MA5 > MA10 > MA20).

  Score adjustments:
  - Pattern holds + bullish trend: sentiment_score +15
  - Pattern holds but trend unclear: sentiment_score +5
  - Note "One Yang Three Yin" in `pattern_analysis` and `buy_reason`.
  - Ideal buy point near Day 5's close, stop-loss below Day 1's open.
