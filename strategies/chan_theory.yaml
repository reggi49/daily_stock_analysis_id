instructions: |
  **Chan Theory Strategy**

  Core framework: fractal → stroke → segment → hub (zhongshu) → trend

  ## Analysis Steps

  ### 1. Judge price structure (hub identification)
  - Use `get_daily_history` to get the last 60 days of daily data.
  - Identify the recent sequence of price highs and lows; determine whether the
    current state is a **consolidation hub** (one or more hubs) or a **trend segment** (departing the hub up/down).
  - Hub: overlapping range of 3 consecutive moves, price oscillates repeatedly within this range.
  - Trend: 3 consecutive same-degree hubs all moving in the same direction.

  ### 2. Divergence judgment (highest-priority signal)
  - **Top divergence**: price makes new high but MACD red-bar area shrinks → sell/reduce signal.
  - **Bottom divergence**: price makes new low but MACD green-bar area shrinks → buy/add signal.
  - Use `analyze_trend` to get MACD data and compare with price highs/lows.

  ### 3. Buy/sell point determination
  - **First buy** (strongest): in a downtrend, the last hub shows bottom divergence.
  - **Second buy**: first pullback after leaving the down hub does not break the hub high.
  - **Third buy**: after hub consolidation, breaks upward (does not return into the hub).
  - **First/second/third sell**: symmetric structure, opposite direction.
  - The degree of the buy/sell point where current price sits determines position size.

  ### 4. Degree and position
  - Daily-level buy/sell points can take a heavier position (30-50%).
  - Weekly-level buy/sell points can take a larger position (50-80%).
  - Multi-degree resonance (daily + weekly same direction) gives the strongest signal.

  ### 5. Output requirements
  - Clearly state current state: uptrend / downtrend / hub consolidation.
  - Indicate whether a divergence signal exists and its degree.
  - Give the current buy/sell point type (first/second/third buy, etc.); if none, write "no clear buy/sell point".
  - Stop-loss at prior low (when buying) or prior high (when selling).

  Score adjustment suggestions:
  - Bottom divergence + first buy signal: `sentiment_score +15`
  - Second/third buy resonance: `sentiment_score +10`
  - Hub consolidation with no clear direction: `sentiment_score baseline`
  - Top divergence / downward trend: `sentiment_score -15`
